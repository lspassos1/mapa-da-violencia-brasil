name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Check whitespace
        run: git diff --check

      - name: Check tracked file size
        run: |
          oversized="$(git ls-files -z | xargs -0 du -k | awk '$1 > 5120 { print $2 " (" $1 " KB)" }')"
          if [ -n "$oversized" ]; then
            echo "Tracked files above 5 MB are not allowed:"
            echo "$oversized"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Smoke public routes
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 > next-start.log 2>&1 &
          server_pid="$!"
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          server_ready=false
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/api/health > /dev/null; then
              server_ready=true
              break
            fi
            sleep 1
          done
          if [ "$server_ready" != "true" ]; then
            echo "Next.js server did not become healthy on http://127.0.0.1:3000/api/health."
            cat next-start.log
            exit 1
          fi
          npm run smoke
