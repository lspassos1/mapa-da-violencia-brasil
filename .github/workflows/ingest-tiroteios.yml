name: Ingestão · tiroteios (Fogo Cruzado)

# Cron grátis do GitHub Actions p/ atualizar mais que o cron diário do Vercel Hobby.
# Chama o endpoint protegido (CRON_SECRET) que puxa a janela da FC -> Supabase.
# De hora em hora. O cron do Vercel (vercel.json) fica como rede de segurança.
on:
  schedule:
    - cron: "0 * * * *" # toda hora (UTC). GitHub pode atrasar alguns minutos.
  workflow_dispatch: {} # permite disparo manual na aba Actions

permissions:
  contents: read

concurrency:
  group: ingest-tiroteios
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/shootings/ingest
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then echo "::error::CRON_SECRET ausente"; exit 1; fi
          code=$(curl -sS -X POST "https://mapa-da-violencia-brasil.vercel.app/api/shootings/ingest" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 120 -o /tmp/resp.json -w "%{http_code}")
          echo "HTTP $code"; cat /tmp/resp.json 2>/dev/null | head -c 400; echo
          # 2xx = ok; 503 (fonte instável) não derruba o agendamento, só avisa.
          case "$code" in 2*) : ;; *) echo "::warning::ingest retornou HTTP $code" ;; esac
