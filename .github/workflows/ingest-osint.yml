name: Ingestão · notícias (OSINT)

# Cron grátis do GitHub Actions p/ a camada OSINT (notícias -> IA/keyword-first ->
# Supabase), além do cron diário do Vercel. A cada 4h (notícia envelhece mais
# devagar que tiroteio, e cada run já cobre um pool grande de artigos).
on:
  schedule:
    - cron: "30 */4 * * *" # a cada 4 horas, no minuto 30 (UTC)
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ingest-osint
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/news-incidents/ingest
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then echo "::error::CRON_SECRET ausente"; exit 1; fi
          code=$(curl -sS -X POST "https://mapa-da-violencia-brasil.vercel.app/api/news-incidents/ingest" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 120 -o /tmp/resp.json -w "%{http_code}")
          echo "HTTP $code"; cat /tmp/resp.json 2>/dev/null | head -c 400; echo
          case "$code" in 2*) : ;; *) echo "::warning::ingest retornou HTTP $code" ;; esac
